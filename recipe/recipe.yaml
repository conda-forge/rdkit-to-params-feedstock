schema_version: 1

context:
  name: rdkit-to-params
  version: "1.3.9"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/rdkit_to_params-${{ version }}.tar.gz
  sha256: f2299e13494a93c3ead8c72cbbba7040efc7cbf4264e084cfdce284bdeb0ec51

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - smiles-to-params=rdkit_to_params.cli:smiles

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - rdkit

tests:
  - python:
      imports:
        - rdkit_to_params
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Create or modify Rosetta params files (topology files) from scratch, RDKit mols or another params file.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/matteoferla/rdkit_to_params

extra:
  recipe-maintainers:
    - jan-janssen
